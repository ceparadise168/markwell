name: Unsupported Kobo schema report
description: "Markwell exited with code 4, or the app said your Kobo looks newer than it knows. 你可以用中文回報，沒問題。日本語でもどうぞ。한국어로 작성하셔도 됩니다."
title: "[schema] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Use this form when the CLI stops with **exit code 4**, or the app shows
        **“Markwell couldn't read the highlights — this looks like a newer Kobo than Markwell knows about yet.”**

        That usually means a Kobo firmware update changed the highlights database layout, and your
        report is exactly what we need to add support. Your saved copy was kept — nothing is lost.

        **Do NOT attach `KoboReader.sqlite` — it contains your reading data** (every highlight, note,
        and book on your device). If more detail is needed, a maintainer will follow up with a few
        safe, read-only queries you can run yourself and paste back without any personal content.

  - type: input
    id: firmware-version
    attributes:
      label: Kobo firmware version
      description: "On the device: Settings → Device information."
      placeholder: "4.41.23145"
    validations:
      required: true

  - type: input
    id: kobo-model
    attributes:
      label: Kobo model
      placeholder: "Kobo Libra 2"
    validations:
      required: true

  - type: textarea
    id: error-text
    attributes:
      label: Exact error text
      description: "Paste the full message from the terminal or the app — it tells us which part of the database changed."
    validations:
      required: true

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed personal data (highlight text, file paths with my name) from logs and screenshots
          required: true
