name: Feature request
description: "Suggest an improvement or a new capability. 你可以用中文回報，沒問題。日本語でもどうぞ。한국어로 작성하셔도 됩니다."
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Which part of Markwell?
      options:
        - CLI
        - GUI
        - Exports
        - Share cards
        - Site
        - Docs
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: "Describe the situation rather than the implementation — “When I …, I can't …”."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: "How you imagine it working. Rough is fine."

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: "Workarounds you use today, or other tools that do this."
