<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="markwell-token" content="__MARKWELL_TOKEN__">
  <meta name="color-scheme" content="light dark">
  <title>Markwell</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232E7D6B'/%3E%3Cpath d='M9 8h3l4 7 4-7h3v16h-3V14l-4 7-4-7v10H9z' fill='white'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="bg-wash" aria-hidden="true"></div>
  <div class="bg-grain" aria-hidden="true"></div>
  <div class="read-progress" id="read-progress" aria-hidden="true"></div>

  <a class="skip-link" href="#view" data-i18n="chrome.skip">Skip to content</a>

  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" width="28" height="28"><rect width="32" height="32" rx="8" fill="currentColor"/><path d="M9 8h3l4 7 4-7h3v16h-3V14l-4 7-4-7v10H9z" fill="#fff"/></svg>
        </span>
        <span class="brand-text">
          <strong>Markwell</strong>
          <small data-i18n="app.tagline">Mark well what you read.</small>
        </span>
        <button class="quit-app" id="quit-app" type="button" aria-label="Quit Markwell" title="Quit Markwell"
                data-i18n-aria="quit.label" data-i18n-title="quit.label">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 3v8"/><path d="M7.1 6.5a7 7 0 1 0 9.8 0"/></svg>
        </button>
      </div>

      <nav class="nav" aria-label="Main" data-i18n-aria="nav.main_label">
        <a href="#/backup" data-route="backup" aria-label="Back up" data-i18n-aria="nav.backup">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 3v12m0 0 4-4m-4 4-4-4M5 17v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2"/></svg>
          <span data-i18n="nav.backup">Back up</span>
        </a>
        <a href="#/library" data-route="library" aria-label="Library" data-i18n-aria="nav.library">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M5 4h6v16H5zM13 4h6v16h-6zM8 8h0M16 8h0"/></svg>
          <span data-i18n="nav.library">Library</span>
        </a>
        <a href="#/history" data-route="history" aria-label="History" data-i18n-aria="nav.history">
          <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 7v5l3 2M3 12a9 9 0 1 0 2.5-6.2M3 4v3h3"/></svg>
          <span data-i18n="nav.history">History</span>
        </a>
      </nav>

      <div class="sidebar-foot">
        <button class="theme-toggle" id="theme-toggle" type="button"
                aria-label="Switch between day and night" title="Day / night"
                data-i18n-aria="theme.toggle_label" data-i18n-title="theme.toggle">
          <span class="ico-sun" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><circle cx="12" cy="12" r="4.2"/><path d="M12 2.5v2M12 19.5v2M4.6 4.6 6 6M18 18l1.4 1.4M2.5 12h2M19.5 12h2M4.6 19.4 6 18M18 6l1.4-1.4"/></svg></span>
          <span class="ico-moon" aria-hidden="true"><svg viewBox="0 0 24 24" focusable="false"><path d="M20 14.5A8.5 8.5 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/></svg></span>
          <span class="label" data-i18n="theme.toggle">Day / night</span>
        </button>
        <select class="locale-select" id="locale-select"
                aria-label="Language" data-i18n-aria="switcher.label"></select>
        <p class="reassure">
          <svg viewBox="0 0 24 24" aria-hidden="true" class="shield"><path d="M12 3l7 3v5c0 4.5-3 8-7 10-4-2-7-5.5-7-10V6z"/><path d="M9 12l2 2 4-4"/></svg>
          <span data-i18n="footer.safety">Markwell only reads your Kobo. It never changes anything on your device.</span>
        </p>
        <p class="version" id="version"></p>
      </div>
    </aside>

    <main class="main" id="view" tabindex="-1">
      <!-- views render here -->
    </main>
  </div>

  <button class="to-top" id="to-top" type="button" aria-label="Back to top" title="Back to top"
          data-i18n-aria="chrome.to_top" data-i18n-title="chrome.to_top">
    <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M12 19V6"/><path d="m5 12 7-7 7 7"/></svg>
  </button>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <script src="i18n.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
